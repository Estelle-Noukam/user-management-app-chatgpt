{% extends 'base.html' %}

{% block content %}

<h2>Modifier utilisateur</h2>

<form method="POST">

    <input
        type="text"
        name="username"
        value="{{ edit_user.username }}"
        required
    ><br>

    <select name="role">

        <option
            value="user"
            {% if edit_user.role == 'user' %}selected{% endif %}
        >
            user
        </option>

        <option
            value="admin"
            {% if edit_user.role == 'admin' %}selected{% endif %}
        >
            admin
        </option>

    </select><br>

    <button type="submit">Modifier</button>

</form>

{% endblock %}
